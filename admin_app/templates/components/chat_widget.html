<button id="staffChatFab" class="staff-chat-fab" type="button" aria-label="Open chat assistant" title="Chat Assistant">
  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
    <path d="M12 3C6.48 3 2 6.86 2 11.62c0 2.2.98 4.2 2.6 5.71-.1.9-.49 2.15-1.44 3.45-.2.27-.04.66.29.72 1.89.33 3.72-.24 5.12-1.05 1.04.3 2.15.46 3.43.46 5.52 0 10-3.86 10-8.62S17.52 3 12 3z"/>
  </svg>
  <span class="staff-chat-fab-label">Chat Assistant</span>
</button>
<section
  id="staffChatModal"
  class="staff-chat-modal"
  data-chat-role="{{ chat_role|default:'guest' }}"
  data-welcome-admin="Good day. Admin assistant mode is now active. Type help to view available commands."
  data-welcome-employee="Good day. Employee assistant mode is now active. Type help to view available commands."
  data-welcome-owner="Good day. Owner assistant mode is now active. You may type: show my rooms or show my bookings."
>
  <div
    class="staff-chat-header"
    id="staffChatHeader"
    data-chat-subtitle="Hotel | Booking | Billing"
    data-chat-subtitle-admin="Admin | Tours | Approvals"
    data-chat-subtitle-employee="Employee | Tours | Tasks"
    data-chat-subtitle-owner="Owner | Rooms | Bookings"
    data-chat-subtitle-guest="Hotel | Booking | Billing"
  >
    <h3 class="staff-chat-title">Ibayaw Tour Assistant</h3>
    <button id="staffChatClose" class="staff-chat-close" type="button">&times;</button>
  </div>
  <div
    id="staffChatMessages"
    class="staff-chat-messages"
    role="log"
    aria-live="polite"
    aria-relevant="additions text"
    aria-label="Staff chat conversation messages"
  ></div>

    <input
      id="staffChatInput"
      class="staff-chat-input"
      type="text"
      placeholder="Type your message..."
      aria-label="Type your message for the chat assistant"
    />
    <button id="staffChatSend" class="staff-chat-send" type="button" aria-label="Send message to chat assistant">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M21.5 2.5a1 1 0 0 0-1.04-.2L2.7 9.1a1 1 0 0 0 .04 1.87l7.08 2.57 2.57 7.08a1 1 0 0 0 1.87.04l6.8-17.76a1 1 0 0 0-.56-1.4z"/>
      </svg>
    </button>
  </div>
</section>

<script>
  (function () {
    const fab = document.getElementById("staffChatFab");
    const modal = document.getElementById("staffChatModal");
    const closeBtn = document.getElementById("staffChatClose");
    const messagesEl = document.getElementById("staffChatMessages");
    const headerEl = document.getElementById("staffChatHeader");
    const inputEl = document.getElementById("staffChatInput");
    const sendBtn = document.getElementById("staffChatSend");
    if (!fab || !modal || !closeBtn || !messagesEl || !inputEl || !sendBtn) {
      return;
    }

    const role = String(modal.getAttribute("data-chat-role") || "guest").trim().toLowerCase();
    const welcomeMap = {
      admin: modal.getAttribute("data-welcome-admin") || "Hello! Admin assistant mode is active.",
      employee: modal.getAttribute("data-welcome-employee") || "Hello! Employee assistant mode is active.",
      owner: modal.getAttribute("data-welcome-owner") || "Hello! Owner assistant mode is active.",
      guest: "Hello! Guest assistant mode is active.",
    };
    const subtitleMap = {
      admin: headerEl ? (headerEl.getAttribute("data-chat-subtitle-admin") || "Admin | Tours | Approvals") : "Admin | Tours | Approvals",
      employee: headerEl ? (headerEl.getAttribute("data-chat-subtitle-employee") || "Employee | Tours | Tasks") : "Employee | Tours | Tasks",
      owner: headerEl ? (headerEl.getAttribute("data-chat-subtitle-owner") || "Owner | Rooms | Bookings") : "Owner | Rooms | Bookings",
      guest: headerEl ? (headerEl.getAttribute("data-chat-subtitle-guest") || "Hotel | Booking | Billing") : "Hotel | Booking | Billing",
    };
    if (headerEl) {
      headerEl.setAttribute("data-chat-subtitle", subtitleMap[role] || subtitleMap.guest);
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function appendFormattedBotText(container, text) {
      const raw = String(text || "").trim();
      if (!raw) {
        container.textContent = "";
        return;
      }

      const roleHelpCard = buildRoleHelpCard(raw);
      if (roleHelpCard) {
        container.appendChild(roleHelpCard);
        return;
      }

      const whyOptionCard = buildWhyOptionCard(raw);
      if (whyOptionCard) {
        container.appendChild(whyOptionCard);
        return;
      }

      const compareCard = buildCompareOptionsCard(raw);
      if (compareCard) {
        container.appendChild(compareCard);
        return;
      }

      const availabilityCard = buildAvailabilityOptionsCard(raw);
      if (availabilityCard) {
        container.appendChild(availabilityCard);
        return;
      }

      const bookingSummaryCard = buildBookingSummaryCard(raw);
      if (bookingSummaryCard) {
        container.appendChild(bookingSummaryCard);
        return;
      }

      const paymentPolicyCard = buildPaymentPolicyCard(raw);
      if (paymentPolicyCard) {
        container.appendChild(paymentPolicyCard);
        return;
      }

      const bookingGuideCard = buildBookingGuideCard(raw);
      if (bookingGuideCard) {
        container.appendChild(bookingGuideCard);
        return;
      }

      const supportGuideCard = buildSupportGuideCard(raw);
      if (supportGuideCard) {
        container.appendChild(supportGuideCard);
        return;
      }

      const clarificationCard = buildClarificationPromptCard(raw);
      if (clarificationCard) {
        container.appendChild(clarificationCard);
        return;
      }

      const recommendationCard = buildReadableRecommendationCard(raw);
      if (recommendationCard) {
        container.appendChild(recommendationCard);
        return;
      }

      const blocks = raw.split(/\n\s*\n/).map((block) => block.trim()).filter(Boolean);
      blocks.forEach((block) => {
        const lines = block.split("\n").map((line) => line.trim()).filter(Boolean);
        if (!lines.length) return;

        const bulletOnly = lines.every((line) => line.startsWith("- "));
        const numberedOnly = lines.every((line) => /^\d+[.)]\s+/.test(line));
        if (bulletOnly || numberedOnly) {
          const list = document.createElement(numberedOnly ? "ol" : "ul");
          list.className = "bot-text-list";
          lines.forEach((line) => {
            const item = document.createElement("li");
            item.textContent = numberedOnly
              ? line.replace(/^\d+[.)]\s+/, "")
              : line.replace(/^-+\s*/, "");
            list.appendChild(item);
          });
          container.appendChild(list);
          return;
        }

        if (lines.length === 1 && /:\s*$/.test(lines[0])) {
          const heading = document.createElement("div");
          heading.className = "bot-text-heading";
          heading.textContent = lines[0];
          container.appendChild(heading);
          return;
        }

        const keyValueRows = lines
          .map((line) => {

          reasons.push(line.replace(/^-+\s*/, "").trim());

        if (!subtitle && !/^-\s+/.test(line)) {

    function buildCompareOptionsCard(rawText) {
      const raw = String(rawText || "").trim();
      if (!/^Comparison of Top \d+ options:/i.test(raw)) {
        return null;
      }

      const compact = raw.replace(/\s+/g, " ").trim();
      const headMatch = compact.match(/^(Comparison of Top \d+ options:)\s*/i);
      const headLine = headMatch ? headMatch[1] : "Comparison";
      let body = compact.replace(/^Comparison of Top \d+ options:\s*/i, "");

      let noteLine = "";
      const noteMatch = body.match(/Reply with:\s*why option <number> for a detailed explanation\.?/i);
      if (noteMatch) {
        noteLine = noteMatch[0];
        body = body.replace(noteMatch[0], "").trim();
      }

      const optionRows = [];
      const optionRegex = /(\d+)\.\s*(.*?)(?=(?:\s+\d+\.\s)|$)/g;
      let match;
      while ((match = optionRegex.exec(body)) !== null) {
        const rank = String(match[1] || "").trim();
        const chunk = String(match[2] || "").trim();
        if (!rank || !chunk) continue;

        const item = { rank: rank, title: `Option ${rank}`, details: [] };

        const matchIdx = chunk.search(/\s+Match:\s+/i);
        const reasonIdx = chunk.search(/\s+Key reason:\s+/i);

        if (matchIdx > 0) {
          const primary = chunk.slice(0, matchIdx).trim();
          if (primary) {
            item.details.push(primary);
          }
          const afterMatch = chunk.slice(matchIdx).replace(/^\s*/g, "");
          if (reasonIdx > matchIdx) {
            const reasonRelative = afterMatch.search(/\s+Key reason:\s+/i);
            if (reasonRelative > 0) {
              const matchLine = afterMatch.slice(0, reasonRelative).trim();
              if (matchLine) item.details.push(matchLine);
              const reasonLine = afterMatch.slice(reasonRelative).trim();
              if (reasonLine) item.details.push(reasonLine);
            } else if (afterMatch) {
              item.details.push(afterMatch.trim());
            }
          } else if (afterMatch) {
            item.details.push(afterMatch.trim());
          }
        } else {
          item.details.push(chunk);
        }

        if (item.details.length) {
          item.title = `${rank}. ${item.details.shift()}`;
        } else {
          item.title = `${rank}. Option ${rank}`;
        }
        optionRows.push(item);
      }

      if (optionRows.length < 2) {
        return null;
      }

      const root = document.createElement("div");
      root.className = "bot-compare-summary";

      const head = document.createElement("div");
      head.className = "bot-compare-head";
      head.textContent = headLine;
      root.appendChild(head);

      const grid = document.createElement("div");
      grid.className = "bot-compare-grid";
      optionRows.forEach((row) => {
        const item = document.createElement("div");
        item.className = "bot-compare-item";

        const title = document.createElement("div");
        title.className = "bot-compare-title";
        title.textContent = row.title;
        item.appendChild(title);

        row.details.forEach((detail) => {
          const meta = document.createElement("div");
          meta.className = "bot-compare-line";
          meta.textContent = detail;
          item.appendChild(meta);
        });

        grid.appendChild(item);
      });
      root.appendChild(grid);

      if (noteLine) {
        const note = document.createElement("div");
        note.className = "bot-compare-note";
        note.textContent = noteLine;
        root.appendChild(note);
      }

      return root;
    }

    function addQuickReplies(list) {
      if (!Array.isArray(list) || !list.length) {
        return;
      }
      const row = document.createElement("div");
      row.className = "staff-chat-quick-replies";
      list.slice(0, 4).forEach((item) => {
        const label = typeof item === "string" ? item : String(item.label || item.value || "");
        const value = typeof item === "string" ? item : String(item.value || item.label || "");
        if (!label || !value) return;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "staff-chat-quick-btn";
        btn.textContent = label;
        btn.addEventListener("click", function () {

      messagesEl.scrollTop = messagesEl.scrollHeight;

    async function sendMessage() {
      const message = String(inputEl.value || "").trim();
      if (!message) return;
      inputEl.value = "";
      addMessage(message, "user");
      sendBtn.disabled = true;
      if (messagesEl) {
        messagesEl.setAttribute("aria-busy", "true");
      }
      const typing = addMessage("Please wait while I process your request...", "bot");

      try {
        const response = await fetch("/api/chat/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: message }),
        });
        let data = {};
        try {
          data = await response.json();
        } catch (e) {
          data = {};
        }

        if (typing && typing.parentNode) typing.parentNode.removeChild(typing);

        const replyText =
          String(data.fulfillmentText || "").trim() ||
          (Array.isArray(data.recommendation_trace) && data.recommendation_trace.length
            ? "Here are the recommendations I found based on your request."
            : (data.billing_link
              ? "I found a page/action for your request. Use the button below to continue."
              : "I can help with your request. Please try rephrasing it in one sentence."));
        const replyNode = addMessage(replyText, "bot", data);

        if (data.billing_link) {
          const a = document.createElement("a");
          a.className = "staff-chat-link";
          a.href = String(data.billing_link);
          a.textContent = String(data.billing_link_label || "Open");
          if (data.open_in_new_tab === true) {
            a.target = "_blank";
            a.rel = "noopener noreferrer";
          }
          replyNode.appendChild(document.createElement("br"));
          replyNode.appendChild(a);
        }

        if (Array.isArray(data.quick_replies) && data.quick_replies.length > 0) {
          addQuickReplies(data.quick_replies);
        }

        if (data.redirect_url) {
          window.location.href = String(data.redirect_url);
        }
      } catch (error) {
        if (typing && typing.parentNode) typing.parentNode.removeChild(typing);
        addMessage("We are unable to connect to the chatbot at the moment. Please try again shortly.", "bot");
      } finally {
        sendBtn.disabled = false;
        if (messagesEl) {
          messagesEl.setAttribute("aria-busy", "false");
        }
        inputEl.focus();
      }
    }

    function openChat() {
      modal.classList.add("open");
      fab.classList.add("hidden");
      if (!messagesEl.dataset.initialized) {
        const welcome = String(welcomeMap[role] || welcomeMap.guest).trim();
        addMessage(
          `${welcome} You can type help to view the prompts available for your role.`,
          "bot"
        );
        addQuickReplies(["help"]);
        messagesEl.dataset.initialized = "1";
      }
      inputEl.focus();
    }

    function closeChat() {
      modal.classList.remove("open");
      fab.classList.remove("hidden");
    }

    fab.addEventListener("click", openChat);

    closeBtn.addEventListener("click", closeChat);

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener("click", function (event) {
      if (event.target === modal) {
        closeChat();
      }
    });
  })();
</script>
