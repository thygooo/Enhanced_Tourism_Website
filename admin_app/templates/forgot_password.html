{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Ibayaw Tour</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f7fc;
      color: #333;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 1.35rem; }
    p { margin: 0 0 16px; color: #666; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d5dbe6;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 14px;
    }
    button {
      width: 100%;
      border: none;
      background: #875a34;
      color: #fff;
      padding: 12px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
    }
    a { color: #875a34; text-decoration: none; }
    .msg { border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; font-size: 0.92rem; }
    .msg.error { background: #fdecec; color: #a22; border: 1px solid #f6caca; }
    .msg.success { background: #edf8ef; color: #1f6b34; border: 1px solid #cfead6; }
    .back { margin-top: 14px; text-align: center; font-size: 0.92rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Forgot Password</h1>
    <p>Enter your employee, guest, or accommodation email to receive a password reset link.</p>

    {% if messages %}
      {% for message in messages %}
        <div class="msg {% if message.tags == 'error' %}error{% else %}success{% endif %}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>
      <button type="submit">Send Reset Link</button>
    </form>

    <div class="back">
      <a href="{% url 'admin_app:login' %}">Back to Login</a>
    </div>
  </div>
</body>
</html>
